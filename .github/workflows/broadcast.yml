name: Broadcast (Discord scan)

on:
  schedule:
    - cron: "*/15 * * * *"  # every 15 min
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-state
  cancel-in-progress: false

jobs:
  broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run broadcast
        env:
          DISCORD_USER_TOKEN: ${{ secrets.DISCORD_USER_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MESSAGES_LIMIT: "50"
          LLM_MODEL: llama-3.3-70b-versatile
          VISION_MODEL: meta-llama/llama-4-scout-17b-16e-instruct
        run: python run_broadcast.py

      - name: Commit state changes
        run: |
          git config user.name "stock-analyzer-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --staged || git commit -m "chore: update broadcast state [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
