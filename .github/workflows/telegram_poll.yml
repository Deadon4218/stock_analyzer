name: Telegram bot command poll

on:
  schedule:
    - cron: "* * * * *"  # every 1 min
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stock-state
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Process Telegram commands
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          LLM_MODEL: llama-3.3-70b-versatile
        run: python webhook_handler.py

      - name: Commit user/state changes
        run: |
          git config user.name "stock-analyzer-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet --staged || git commit -m "chore: update users/state [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
